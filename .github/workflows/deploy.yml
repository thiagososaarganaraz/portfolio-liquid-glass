name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main # O el nombre de tu rama principal
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm install --legacy-peer-deps # Usamos el flag por el conflicto de date-fns
      - name: Build
        run: npm run build
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_THIAGO_PORTFOLIO_DEV }}'
          channelId: live # Esto fuerza el despliegue a la URL de producción directamente
          projectId: thiago-portfolio-dev